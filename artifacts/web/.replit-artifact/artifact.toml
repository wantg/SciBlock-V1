kind = "web"
previewPath = "/"
title = "SciBlock"
version = "1.0.0"
id = "artifacts/web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22333
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/web run dev"

[services.env]
PORT = "22333"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/web", "run", "build"]
publicDir = "artifacts/web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
